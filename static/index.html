<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Cosmique – Excel & Prompts</title>
    <!-- Styles cinématiques -->
    <link rel="stylesheet" href="/style.css">
    <!-- Librairie Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Toile étoilée animée en fond -->
    <canvas id="starfield"></canvas>

    <div id="chat-container" role="log" aria-live="polite">
        <!-- Les messages apparaîtront ici comme des éclats de lumière -->
    </div>

    <div id="input-area">
        <textarea id="user-input" placeholder="Posez une question sur Excel ou l'ingénierie de prompt..."
                  rows="1" aria-label="Message utilisateur"></textarea>
        <button id="send-button" aria-label="Envoyer">
            <span class="star-icon">✦</span>
        </button>
    </div>

    <div id="loading-indicator" style="display: none;">
        <div class="pulse-star"></div> L’univers réfléchit...
    </div>

    <script src="/app.js"></script>
    <script>
        // Animation du fond étoilé (petit script interne)
        (function() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let stars = [];
            const numStars = 200;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5 + 0.2,
                    alpha: Math.random() * 0.8 + 0.2,
                    speed: Math.random() * 0.02 + 0.005
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                    ctx.fill();
                    // Scintillement
                    star.alpha += star.speed * (Math.random() > 0.5 ? 1 : -1);
                    if (star.alpha > 0.9) star.speed = -Math.abs(star.speed);
                    if (star.alpha < 0.2) star.speed = Math.abs(star.speed);
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>
</html>
